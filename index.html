<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kraftbauer Prompt-Studio</title>
<meta name="description" content="Videoidee einsprechen – fertigen Veo-Prompt bekommen.">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#14120F">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14120F;
    --panel:#221E19;
    --edge:#332D25;
    --amber:#F2A33C;
    --text:#F5EFE4;
    --muted:#8A7F6E;
    --ready:#7FB069;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'Archivo',system-ui,sans-serif;min-height:100%}
  body{padding:20px 16px calc(28px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto}
  h1{font-family:'Archivo Black',sans-serif;text-transform:uppercase;font-size:1.35rem;letter-spacing:.06em;line-height:1.2}
  h1 span{color:var(--amber)}
  .sub{color:var(--muted);font-size:.85rem;margin-top:4px}
  header{margin-bottom:24px}

  /* Mikrofon-Startknopf wie ein Armaturen-Startknopf */
  .mic-wrap{display:flex;flex-direction:column;align-items:center;margin:8px 0 20px}
  .mic-btn{
    width:150px;height:150px;border-radius:50%;border:3px solid var(--edge);
    background:radial-gradient(circle at 35% 30%, #2B2620, var(--panel) 70%);
    color:var(--amber);display:flex;align-items:center;justify-content:center;
    cursor:pointer;position:relative;box-shadow:0 6px 24px rgba(0,0,0,.5), inset 0 2px 6px rgba(255,255,255,.05);
    -webkit-tap-highlight-color:transparent;
  }
  .mic-btn:focus-visible{outline:3px solid var(--amber);outline-offset:4px}
  .mic-btn svg{width:56px;height:56px}
  .mic-btn::before{
    content:"";position:absolute;inset:-10px;border-radius:50%;
    border:3px solid var(--amber);opacity:0;
  }
  .mic-btn.listening{border-color:var(--amber)}
  .mic-btn.listening::before{opacity:1;animation:pulse 1.6s ease-out infinite}
  @keyframes pulse{
    0%{transform:scale(.95);opacity:.8}
    100%{transform:scale(1.18);opacity:0}
  }
  @media (prefers-reduced-motion: reduce){
    .mic-btn.listening::before{animation:none;opacity:.8}
  }
  .mic-status{margin-top:12px;font-size:.95rem;font-weight:600;letter-spacing:.02em;min-height:1.4em}
  .mic-status.on{color:var(--amber)}
  .mic-status.ready{color:var(--ready)}
  .mic-status.err{color:#E07A5F}

  .panel{background:var(--panel);border:1px solid var(--edge);border-radius:14px;padding:16px;margin-bottom:16px}
  label{display:block;font-family:'Archivo Black',sans-serif;text-transform:uppercase;font-size:.75rem;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
  textarea{
    width:100%;min-height:110px;background:var(--bg);border:1px solid var(--edge);border-radius:10px;
    color:var(--text);font-family:'Archivo',sans-serif;font-size:1rem;padding:12px;resize:vertical;line-height:1.45
  }
  textarea:focus-visible{outline:2px solid var(--amber);outline-offset:1px}
  .hint{color:var(--muted);font-size:.8rem;margin-top:8px;line-height:1.4}

  .btn{
    width:100%;border:none;border-radius:12px;padding:16px;font-family:'Archivo Black',sans-serif;
    text-transform:uppercase;letter-spacing:.06em;font-size:1rem;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:focus-visible{outline:3px solid var(--text);outline-offset:2px}
  .btn-amber{background:var(--amber);color:#14120F}
  .btn-amber:disabled{background:var(--edge);color:var(--muted);cursor:default}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--edge);margin-top:10px;font-size:.85rem;padding:12px}
  .btn-green{background:var(--ready);color:#14120F}

  #resultPanel{display:none}
  #promptOut{
    white-space:pre-wrap;background:var(--bg);border:1px solid var(--edge);border-radius:10px;
    padding:14px;font-size:.95rem;line-height:1.5;margin-bottom:12px
  }
  .spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(20,18,15,.3);border-top-color:#14120F;border-radius:50%;animation:spin .8s linear infinite;vertical-align:-4px;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){.spinner{animation-duration:2s}}
  .copied{color:var(--ready);font-weight:600;font-size:.9rem;text-align:center;margin-top:10px;min-height:1.2em}
</style>
</head>
<body>
<header>
  <h1>Kraftbauer <span>Prompt-Studio</span></h1>
  <p class="sub">Idee einsprechen → fertiger Veo-Prompt zum Kopieren</p>
</header>

<div class="mic-wrap">
  <button id="micBtn" class="mic-btn" aria-label="Aufnahme starten oder stoppen">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 15a3.5 3.5 0 0 0 3.5-3.5v-6a3.5 3.5 0 1 0-7 0v6A3.5 3.5 0 0 0 12 15Z"/>
      <path d="M18.5 11.5a6.5 6.5 0 0 1-13 0H4a8 8 0 0 0 7 7.94V22h2v-2.56a8 8 0 0 0 7-7.94h-1.5Z"/>
    </svg>
  </button>
  <div id="micStatus" class="mic-status" role="status" aria-live="polite"></div>
</div>

<div class="panel">
  <label for="idea">Deine Videoidee</label>
  <textarea id="idea" placeholder="Zum Beispiel: Der Scania fahrt in der Fruah durchs Pustertal, Nebel über der Rienz…"></textarea>
  <p class="hint" id="ideaHint">Du kannst den Text jederzeit antippen und ändern, bevor du den Prompt erstellst.</p>
</div>

<button id="genBtn" class="btn btn-amber" disabled>Prompt erstellen</button>

<div class="panel" id="resultPanel">
  <label>Dein Veo-Prompt (Englisch)</label>
  <div id="promptOut"></div>
  <button id="copyBtn" class="btn btn-green">Prompt kopieren</button>
  <div id="copyMsg" class="copied" role="status" aria-live="polite"></div>
  <button id="againBtn" class="btn btn-ghost">Neue Idee einsprechen</button>
</div>

<script>
const micBtn = document.getElementById('micBtn');
const micStatus = document.getElementById('micStatus');
const ideaEl = document.getElementById('idea');
const genBtn = document.getElementById('genBtn');
const resultPanel = document.getElementById('resultPanel');
const promptOut = document.getElementById('promptOut');
const copyBtn = document.getElementById('copyBtn');
const copyMsg = document.getElementById('copyMsg');
const againBtn = document.getElementById('againBtn');

let recognition = null;
let listening = false;
let finalText = '';

function setStatus(text, cls){
  micStatus.textContent = text;
  micStatus.className = 'mic-status' + (cls ? ' ' + cls : '');
}
function updateGenBtn(){
  genBtn.disabled = ideaEl.value.trim().length < 3;
}
ideaEl.addEventListener('input', updateGenBtn);

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SR) {
  recognition = new SR();
  recognition.lang = 'de-DE';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    listening = true;
    micBtn.classList.add('listening');
    setStatus('Ich höre zu … sprich einfach los. Zum Stoppen antippen.', 'on');
  };
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalText += t + ' ';
      else interim += t;
    }
    ideaEl.value = (finalText + interim).trim();
    updateGenBtn();
  };
  recognition.onerror = (e) => {
    listening = false;
    micBtn.classList.remove('listening');
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      setStatus('Mikrofon nicht erlaubt. Du kannst unten tippen oder das Tastatur-Mikrofon nutzen.', 'err');
    } else if (e.error === 'no-speech') {
      setStatus('Nichts gehört. Knopf antippen und nochmal probieren.', 'ready');
    } else {
      setStatus('Spracherkennung unterbrochen. Knopf antippen für neuen Versuch.', 'err');
    }
  };
  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove('listening');
    if (micStatus.classList.contains('on')) {
      setStatus('Aufnahme gestoppt. Text unten prüfen oder ändern.', 'ready');
    }
  };

  micBtn.addEventListener('click', () => {
    if (listening) { recognition.stop(); return; }
    finalText = ideaEl.value.trim() ? ideaEl.value.trim() + ' ' : '';
    try { recognition.start(); } catch(_) {}
  });

  // Auto-Zuhören beim Start (klappt, sobald die Mikrofon-Berechtigung
  // einmal erteilt wurde; sonst zeigt der Browser erst die Nachfrage)
  window.addEventListener('load', () => {
    setTimeout(() => { try { recognition.start(); } catch(_) {} }, 400);
  });
} else {
  micBtn.style.display = 'none';
  setStatus('Spracherkennung nicht verfügbar – nutze das Mikrofon auf deiner Tastatur zum Diktieren.', 'err');
  document.getElementById('ideaHint').textContent =
    'Tipp: Textfeld antippen und auf der Samsung-Tastatur das Mikrofon-Symbol drücken, dann kannst du trotzdem diktieren.';
}

genBtn.addEventListener('click', async () => {
  const idea = ideaEl.value.trim();
  if (!idea) return;
  if (listening && recognition) recognition.stop();

  genBtn.disabled = true;
  genBtn.innerHTML = '<span class="spinner"></span>Prompt wird erstellt …';
  copyMsg.textContent = '';

  try {
    const res = await fetch('/api/prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idea })
    });
    const data = await res.json();
    if (!res.ok || !data.prompt) throw new Error(data.error || 'Serverfehler');
    promptOut.textContent = data.prompt;
    resultPanel.style.display = 'block';
    resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (err) {
    promptOut.textContent = 'Da ist etwas schiefgegangen: ' + err.message +
      '\n\nBitte nochmal auf „Prompt erstellen" drücken. Wenn es wieder nicht geht: Internet prüfen.';
    resultPanel.style.display = 'block';
  } finally {
    genBtn.disabled = false;
    genBtn.textContent = 'Prompt erstellen';
    updateGenBtn();
  }
});

copyBtn.addEventListener('click', async () => {
  const text = promptOut.textContent;
  try {
    await navigator.clipboard.writeText(text);
    copyMsg.textContent = 'Kopiert! Jetzt in Google Flow einfügen.';
  } catch (_) {
    // Fallback für ältere Browser
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      copyMsg.textContent = 'Kopiert! Jetzt in Google Flow einfügen.';
    } catch (e) {
      copyMsg.textContent = 'Kopieren ging nicht – Text bitte gedrückt halten und manuell kopieren.';
    }
    document.body.removeChild(ta);
  }
});

againBtn.addEventListener('click', () => {
  ideaEl.value = '';
  finalText = '';
  resultPanel.style.display = 'none';
  copyMsg.textContent = '';
  updateGenBtn();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (recognition) { try { recognition.start(); } catch(_) {} }
});

// Service Worker für die Installierbarkeit (PWA)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
